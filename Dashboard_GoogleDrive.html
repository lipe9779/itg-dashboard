<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ITG Egypt Customers Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #f9fafb;
      padding: 20px;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    
    h1 { font-size: 24px; margin-bottom: 8px; font-weight: 700; }
    .subtitle { color: #6b7280; font-size: 12px; margin-bottom: 20px; }
    
    .loading-section {
      background: rgba(232,170,20,0.1);
      border: 2px solid rgba(232,170,20,0.5);
      padding: 30px;
      border-radius: 8px;
      text-align: center;
      margin-bottom: 20px;
    }
    
    .spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 4px solid rgba(232,170,20,0.2);
      border-top: 4px solid #E8AA14;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 15px;
    }
    
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .status {
      margin-top: 15px;
      font-size: 13px;
      color: #9ca3af;
    }
    
    .status.success { color: #10B981; font-weight: 600; }
    .status.error { color: #ef4444; font-weight: 600; }
    
    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    
    input[type="text"], select {
      padding: 8px 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #f9fafb;
      border-radius: 6px;
      font-size: 13px;
      flex: 1;
      min-width: 120px;
    }
    
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }
    
    .kpi-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      padding: 12px;
      border-radius: 6px;
      border-left: 3px solid #E8AA14;
    }
    
    .kpi-label { font-size: 10px; color: #9ca3af; text-transform: uppercase; margin-bottom: 4px; }
    .kpi-value { font-size: 18px; font-weight: 700; color: #E8AA14; }
    .kpi-sub { font-size: 10px; color: #6b7280; margin-top: 3px; }
    
    .table-wrapper {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 8px;
      overflow-x: auto;
    }
    
    .table-info {
      padding: 10px 15px;
      font-size: 12px;
      color: #9ca3af;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    
    th {
      padding: 10px;
      text-align: left;
      background: rgba(255,255,255,0.05);
      font-size: 10px;
      text-transform: uppercase;
      color: #9ca3af;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      white-space: nowrap;
    }
    
    td {
      padding: 8px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    tbody tr { cursor: pointer; }
    tbody tr:active { background: rgba(232,170,20,0.1); }
    
    .highlight { color: #E8AA14; font-weight: 600; }
    .status-badge {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .status-ok { background: rgba(16,185,129,0.2); color: #10B981; }
    .status-pending { background: rgba(239,68,68,0.2); color: #ef4444; }
    
    .no-data { text-align: center; padding: 30px; color: #6b7280; }
    
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.75);
      z-index: 1000;
      padding: 20px;
      overflow-y: auto;
    }
    
    .modal.active { display: flex; align-items: flex-start; justify-content: center; }
    
    .modal-content {
      background: #111827;
      padding: 20px;
      border-radius: 8px;
      max-width: 500px;
      width: 100%;
      border: 1px solid rgba(255,255,255,0.1);
      margin-top: 60px;
    }
    
    .modal-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
    }
    
    .modal-title { font-size: 16px; font-weight: 700; }
    .close-btn {
      background: rgba(255,255,255,0.08);
      border: none;
      color: #9ca3af;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 16px;
    }
    
    .detail-row {
      display: grid;
      grid-template-columns: 40% 60%;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 12px;
    }
    
    .detail-label { color: #9ca3af; text-transform: uppercase; font-size: 10px; font-weight: 600; }
    .detail-value { color: #d1d5db; }
    .detail-value.highlight { color: #E8AA14; font-weight: 600; }
    .detail-value.ok { color: #10B981; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📊 ITG Egypt Customers Dashboard</h1>
    <div class="subtitle">Loading from Google Drive...</div>

    <div class="loading-section" id="loadingSection">
      <div class="spinner"></div>
      <div class="status" id="status">⏳ Loading data from Google Drive...</div>
    </div>

    <div class="controls" id="controls" style="display: none;">
      <select id="yearFilter">
        <option value="">All Years</option>
      </select>
      <input type="text" id="searchInput" placeholder="Search RIF, Supplier, Consignee...">
      <select id="statusFilter">
        <option value="">All Status</option>
        <option value="Shipped">Shipped</option>
        <option value="Collected">Collected</option>
        <option value="Paid">Paid</option>
      </select>
    </div>

    <div class="kpi-grid" id="kpis"></div>

    <div class="table-wrapper" id="tableWrapper" style="display: none;">
      <div class="table-info" id="tableInfo"></div>
      <table>
        <thead>
          <tr>
            <th>RIF</th>
            <th>Year</th>
            <th>Supplier</th>
            <th>Consignee</th>
            <th>Goods</th>
            <th>S/C Value</th>
            <th>Amount</th>
            <th>Ship</th>
            <th>Collect</th>
            <th>Pay</th>
            <th>Balance</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-content">
      <div class="modal-header">
        <div>
          <div class="modal-title" id="modalTitle"></div>
          <div style="font-size: 11px; color: #6b7280; margin-top: 3px;" id="modalSub"></div>
        </div>
        <button class="close-btn" onclick="closeModal()">✕</button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

  <script>
    let ORDERS = [];

    // Google Drive file ID
    const DRIVE_FILE_ID = '1ebZVnDcM5OV1g3MUrc84CHKaJrBxlafy';
    const DRIVE_DOWNLOAD_URL = `https://drive.google.com/uc?export=download&id=${DRIVE_FILE_ID}`;

    async function loadFromGoogleDrive() {
      try {
        const status = document.getElementById('status');
        status.textContent = '⏳ Downloading file from Google Drive...';

        const response = await fetch(DRIVE_DOWNLOAD_URL);

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        status.textContent = '⏳ Parsing Excel...';

        const arrayBuffer = await response.arrayBuffer();
        const workbook = XLSX.read(new Uint8Array(arrayBuffer), { type: 'array' });

        if (!workbook.SheetNames.includes('EGYPT Customers')) {
          throw new Error('Sheet "EGYPT Customers" not found');
        }

        status.textContent = '⏳ Extracting data...';

        const sheet = workbook.Sheets['EGYPT Customers'];
        const sheetData = XLSX.utils.sheet_to_json(sheet, { header: 1 });

        if (sheetData.length < 2) throw new Error('No data in sheet');

        // Column indices
        const colIdx = {
          rif: 0,
          year: 1,
          supplier: 4,
          consignee: 51,
          goods: 53,
          sc_value: 57,
          amount: 67,
          ship_status: 41,
          coll_status: 63,
          paying_status: 27,
          balance: 62
        };

        ORDERS = [];
        sheetData.slice(1).forEach(row => {
          const order = {};
          Object.entries(colIdx).forEach(([key, idx]) => {
            const val = row[idx];
            if (val != null && val !== '') {
              order[key] = String(val).trim();
            }
          });
          if (order.rif) ORDERS.push(order);
        });

        if (ORDERS.length === 0) throw new Error('No valid orders found');

        status.className = 'status success';
        status.textContent = `✓ Loaded ${ORDERS.length} orders`;

        // Hide loading, show dashboard
        document.getElementById('loadingSection').style.display = 'none';
        document.getElementById('controls').style.display = 'flex';
        document.getElementById('tableWrapper').style.display = 'block';

        // Setup year filter
        const years = [...new Set(ORDERS.map(o => o.year))].sort();
        const yearSelect = document.getElementById('yearFilter');
        yearSelect.innerHTML = '<option value="">All Years</option>';
        years.forEach(y => {
          const opt = document.createElement('option');
          opt.value = y;
          opt.textContent = y;
          yearSelect.appendChild(opt);
        });

        render();

      } catch (err) {
        const status = document.getElementById('status');
        status.className = 'status error';
        status.textContent = `✗ Error: ${err.message}`;
      }
    }

    function fmt(v) {
      if (!v) return '—';
      const n = parseFloat(v);
      if (isNaN(n)) return '—';
      if (Math.abs(n) >= 1e6) return `$${(n/1e6).toFixed(1)}M`;
      if (Math.abs(n) >= 1e3) return `$${(n/1e3).toFixed(0)}K`;
      return `$${n.toFixed(0)}`;
    }

    function getFiltered() {
      const yr = document.getElementById('yearFilter').value;
      const q = document.getElementById('searchInput').value.toLowerCase();
      const st = document.getElementById('statusFilter').value;

      return ORDERS.filter(o => {
        if (yr && o.year !== yr) return false;
        if (q) {
          const search = `${o.rif}${o.supplier}${o.consignee}`.toLowerCase();
          if (!search.includes(q)) return false;
        }
        if (st && o.ship_status !== st && o.coll_status !== st && o.paying_status !== st) return false;
        return true;
      });
    }

    function render() {
      const filt = getFiltered();

      let sc = 0, amt = 0, bal = 0, coll = 0;
      filt.forEach(o => {
        sc += parseFloat(o.sc_value) || 0;
        amt += parseFloat(o.amount) || 0;
        bal += parseFloat(o.balance) || 0;
        if (o.coll_status === 'Collected') coll++;
      });

      document.getElementById('kpis').innerHTML = `
        <div class="kpi-card">
          <div class="kpi-label">S/C Value</div>
          <div class="kpi-value">${fmt(sc)}</div>
          <div class="kpi-sub">${filt.length} orders</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Amount</div>
          <div class="kpi-value">${fmt(amt)}</div>
          <div class="kpi-sub">Margin</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Margin %</div>
          <div class="kpi-value">${sc > 0 ? ((sc - amt) / sc * 100).toFixed(1) : 0}%</div>
          <div class="kpi-sub">Profit</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Balance</div>
          <div class="kpi-value">${fmt(bal)}</div>
          <div class="kpi-sub">To collect</div>
        </div>
      `;

      document.getElementById('tableInfo').textContent = `${filt.length} of ${ORDERS.length}`;

      if (filt.length === 0) {
        document.getElementById('tableBody').innerHTML = '<tr><td colspan="11" class="no-data">No orders</td></tr>';
        return;
      }

      document.getElementById('tableBody').innerHTML = filt.map((o, i) => `
        <tr onclick="detail(${ORDERS.indexOf(o)})">
          <td class="highlight">${o.rif}</td>
          <td>${o.year}</td>
          <td>${o.supplier || '—'}</td>
          <td>${o.consignee || '—'}</td>
          <td style="max-width: 100px;">${o.goods ? o.goods.substring(0, 20) : '—'}</td>
          <td class="highlight">${fmt(o.sc_value)}</td>
          <td>${fmt(o.amount)}</td>
          <td><span class="status-badge ${o.ship_status === 'Shipped' ? 'status-ok' : 'status-pending'}">${o.ship_status ? o.ship_status.substring(0, 3) : '—'}</span></td>
          <td><span class="status-badge ${o.coll_status === 'Collected' ? 'status-ok' : 'status-pending'}">${o.coll_status ? o.coll_status.substring(0, 3) : '—'}</span></td>
          <td><span class="status-badge ${o.paying_status === 'Paid' ? 'status-ok' : 'status-pending'}">${o.paying_status ? o.paying_status.substring(0, 3) : '—'}</span></td>
          <td style="color: ${parseFloat(o.balance) > 0 ? '#ef4444' : '#10B981'};">${fmt(o.balance)}</td>
        </tr>
      `).join('');
    }

    function detail(i) {
      const o = ORDERS[i];
      document.getElementById('modalTitle').textContent = `RIF ${o.rif}`;
      document.getElementById('modalSub').textContent = `${o.supplier || '—'} · Year ${o.year}`;
      document.getElementById('modalBody').innerHTML = `
        <div class="detail-row"><div class="detail-label">Year</div><div class="detail-value">${o.year}</div></div>
        <div class="detail-row"><div class="detail-label">Supplier</div><div class="detail-value">${o.supplier || '—'}</div></div>
        <div class="detail-row"><div class="detail-label">Consignee</div><div class="detail-value">${o.consignee || '—'}</div></div>
        <div class="detail-row"><div class="detail-label">Goods</div><div class="detail-value">${o.goods || '—'}</div></div>
        <div class="detail-row"><div class="detail-label">S/C Value</div><div class="detail-value highlight">${fmt(o.sc_value)}</div></div>
        <div class="detail-row"><div class="detail-label">Amount</div><div class="detail-value highlight">${fmt(o.amount)}</div></div>
        <div class="detail-row"><div class="detail-label">Shipping Status</div><div class="detail-value ok">${o.ship_status || '—'}</div></div>
        <div class="detail-row"><div class="detail-label">Collection Status</div><div class="detail-value ok">${o.coll_status || '—'}</div></div>
        <div class="detail-row"><div class="detail-label">Payment Status</div><div class="detail-value ok">${o.paying_status || '—'}</div></div>
        <div class="detail-row"><div class="detail-label">Balance</div><div class="detail-value" style="color: ${parseFloat(o.balance) > 0 ? '#ef4444' : '#10B981'};">${fmt(o.balance)}</div></div>
      `;
      document.getElementById('modal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('active');
    }

    document.getElementById('yearFilter').addEventListener('change', render);
    document.getElementById('searchInput').addEventListener('input', render);
    document.getElementById('statusFilter').addEventListener('change', render);

    // Load on page load
    window.addEventListener('load', loadFromGoogleDrive);
  </script>
</body>
</html>
