<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ITG Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
  <!-- bcryptjs for client-side password verification -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bcryptjs/2.4.3/bcrypt.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #f9fafb; padding: 20px; }
    .container { max-width: 100%; margin: 0 auto; }
    
    /* LOGIN SCREEN */
    .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(135deg, #0d1117 0%, #1a1f2e 100%); z-index: 10000; }
    .login-container { background: rgba(20, 25, 40, 0.9); border: 1px solid rgba(232, 170, 20, 0.2); backdrop-filter: blur(10px); padding: 40px; border-radius: 12px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8); }
    .login-header { text-align: center; margin-bottom: 30px; }
    .login-header h1 { font-size: 28px; font-weight: 700; color: #E8AA14; margin-bottom: 8px; }
    .login-header p { font-size: 12px; color: #9ca3af; }
    .login-form { display: flex; flex-direction: column; gap: 15px; }
    .form-group { display: flex; flex-direction: column; }
    .form-group label { font-size: 11px; color: #9ca3af; text-transform: uppercase; margin-bottom: 6px; font-weight: 600; }
    .form-group input { padding: 12px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: #f9fafb; border-radius: 6px; font-size: 14px; }
    .form-group input:focus { outline: none; border-color: rgba(232, 170, 20, 0.5); background: rgba(232, 170, 20, 0.05); }
    .login-error { padding: 12px; background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3); color: #ef4444; border-radius: 6px; font-size: 12px; display: none; }
    .login-error.show { display: block; }
    .login-btn { background: #E8AA14; color: #0d1117; border: none; padding: 12px 24px; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 14px; transition: all 0.2s; }
    .login-btn:hover { background: #f5bb45; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(232, 170, 20, 0.3); }
    .login-btn:disabled { background: #6b7280; cursor: not-allowed; transform: none; }
    .login-spinner { display: none; }
    .login-spinner.show { display: inline-block; margin-left: 8px; }
    .spinner { border: 2px solid rgba(255, 255, 255, 0.1); border-top: 2px solid #E8AA14; border-radius: 50%; width: 16px; height: 16px; animation: spin 0.8s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    /* DASHBOARD (hidden by default) */
    .dashboard { display: none; }
    .dashboard.active { display: block; }
    .header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; justify-content: space-between; }
    h1 { font-size: 24px; font-weight: 700; }
    .header-right { display: flex; gap: 10px; align-items: center; }
    .logout-btn { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #ef4444; padding: 8px 16px; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 12px; transition: all 0.2s; }
    .logout-btn:hover { background: rgba(239, 68, 68, 0.2); border-color: rgba(239, 68, 68, 0.5); }
    .user-badge { font-size: 11px; color: #9ca3af; padding: 6px 12px; background: rgba(255, 255, 255, 0.05); border-radius: 4px; }
    
    .subtitle { color: #6b7280; font-size: 12px; margin-bottom: 20px; }
    .file-upload-section { background: rgba(232,170,20,0.1); border: 2px dashed rgba(232,170,20,0.5); padding: 40px; border-radius: 8px; text-align: center; margin-bottom: 20px; }
    .file-input { display: none; }
    .upload-btn { background: #E8AA14; color: #0d1117; border: none; padding: 12px 24px; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 14px; }
    
    .search-section { margin-bottom: 15px; }
    .search-title { font-size: 11px; color: #9ca3af; text-transform: uppercase; margin-bottom: 8px; font-weight: 600; }
    .search-inputs { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
    input[type="text"] { padding: 8px 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #f9fafb; border-radius: 6px; font-size: 13px; flex: 1; min-width: 150px; }
    
    .filters-wrapper { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .filters-section { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.07); padding: 15px; border-radius: 8px; }
    .filter-group { margin-bottom: 12px; }
    .filter-group:last-child { margin-bottom: 0; }
    .filter-label { font-size: 10px; color: #9ca3af; text-transform: uppercase; margin-bottom: 6px; font-weight: 600; display: block; }
    .filter-buttons { display: flex; gap: 6px; flex-wrap: wrap; }
    .filter-btn { padding: 6px 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #9ca3af; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: 500; transition: all 0.2s; }
    .filter-btn:hover { background: rgba(232,170,20,0.2); border-color: rgba(232,170,20,0.5); color: #E8AA14; }
    .filter-btn.active { background: #E8AA14; color: #0d1117; border-color: #E8AA14; font-weight: 600; }
    .filter-btn.clear { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.3); color: #ef4444; font-size: 10px; width: 100%; }

    .kpi-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 20px; }
    .kpi-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); padding: 15px; border-radius: 6px; border-left: 3px solid #E8AA14; }
    .kpi-label { font-size: 10px; color: #9ca3af; text-transform: uppercase; margin-bottom: 6px; font-weight: 600; }
    .kpi-value { font-size: 20px; font-weight: 700; color: #E8AA14; }
    
    .table-wrapper { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.07); border-radius: 8px; margin-bottom: 30px; display: flex; flex-direction: column; width: 100%; }
    .table-info { padding: 10px 15px; font-size: 12px; color: #9ca3af; background: rgba(0,0,0,0.2); flex-shrink: 0; border-bottom: 1px solid rgba(255,255,255,0.07); }
    .table-container { height: auto; max-height: calc(20 * 40px + 50px); overflow-y: scroll; overflow-x: auto; width: 100%; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    tbody tr { height: 40px; }
    thead { position: sticky; top: 0; z-index: 10; }
    th { padding: 10px; text-align: left; background: rgba(255,255,255,0.05); font-size: 10px; text-transform: uppercase; color: #9ca3af; border-bottom: 1px solid rgba(255,255,255,0.1); white-space: nowrap; cursor: pointer; user-select: none; }
    th:hover { background: rgba(232,170,20,0.1); }
    th::after { content: ''; display: inline-block; margin-left: 5px; }
    th.sort-asc::after { content: '▲'; font-size: 8px; color: #E8AA14; }
    th.sort-desc::after { content: '▼'; font-size: 8px; color: #E8AA14; }
    td { padding: 8px 10px; border-bottom: 1px solid rgba(255,255,255,0.04); }
    tbody tr { cursor: pointer; }
    tbody tr:hover { background: rgba(232,170,20,0.05); }
    .highlight { color: #E8AA14; font-weight: 600; }
    .status-badge { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 10px; font-weight: 600; text-transform: uppercase; white-space: nowrap; }
    .status-ok { background: rgba(16,185,129,0.2); color: #10B981; }
    .status-pending { background: rgba(239,68,68,0.2); color: #ef4444; }
    .no-data { text-align: center; padding: 30px; color: #6b7280; }
    
    .charts-section { display: flex; flex-direction: column; gap: 30px; margin-bottom: 30px; }
    .chart-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.07); padding: 20px; border-radius: 8px; display: grid; grid-template-columns: 1fr 1fr; gap: 30px; width: 100%; }
    .chart-title { font-size: 12px; color: #9ca3af; text-transform: uppercase; margin-bottom: 15px; font-weight: 600; grid-column: 1 / -1; }
    .chart-left { display: flex; align-items: center; justify-content: center; }
    .chart-canvas { position: relative; height: 300px; width: 100%; }
    canvas { cursor: pointer; }
    .chart-right { overflow-y: auto; max-height: 300px; padding-right: 10px; }
    .top10-title { font-size: 11px; color: #9ca3af; text-transform: uppercase; margin-bottom: 12px; font-weight: 600; }
    .top10-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 11px; }
    .top10-rank { color: #E8AA14; font-weight: 600; min-width: 25px; }
    .top10-label { flex: 1; margin: 0 10px; color: #d1d5db; }
    .top10-value { color: #9ca3af; text-align: right; }
    
    .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.75); z-index: 1000; padding: 20px; overflow-y: auto; }
    .modal.active { display: flex; align-items: flex-start; justify-content: center; }
    .modal-content { background: #111827; padding: 20px; border-radius: 8px; max-width: 600px; width: 100%; border: 1px solid rgba(255,255,255,0.1); margin-top: 60px; max-height: 80vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; margin-bottom: 15px; }
    .modal-title { font-size: 16px; font-weight: 700; }
    .close-btn { background: rgba(255,255,255,0.08); border: none; color: #9ca3af; cursor: pointer; padding: 4px 8px; border-radius: 4px; }
    .detail-row { display: grid; grid-template-columns: 40% 60%; gap: 10px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 12px; }
    .detail-label { color: #9ca3af; text-transform: uppercase; font-size: 10px; font-weight: 600; }
    .detail-value { color: #d1d5db; word-break: break-word; }
    .detail-value.highlight { color: #E8AA14; font-weight: 600; }
    
    .report-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    .report-table th { padding: 8px; text-align: left; background: rgba(232,170,20,0.1); font-size: 10px; color: #E8AA14; border: 1px solid rgba(232,170,20,0.3); }
    .report-table td { padding: 6px 8px; border: 1px solid rgba(255,255,255,0.1); font-size: 11px; }
    .report-table tr:nth-child(even) { background: rgba(0,0,0,0.2); }

    @media (max-width: 1024px) {
      .filters-wrapper { grid-template-columns: 1fr; }
      .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 768px) {
      .container { padding: 10px; }
      .header { flex-direction: column; align-items: flex-start; }
      .header-right { width: 100%; }
      .filters-wrapper { grid-template-columns: 1fr; }
      .kpi-grid { grid-template-columns: 1fr; }
      .chart-card { grid-template-columns: 1fr; }
      .chart-canvas { height: 200px; }
      .login-container { max-width: 90%; padding: 30px 20px; }
    }
  </style>
</head>
<body>
  <!-- LOGIN SCREEN -->
  <div class="login-screen" id="loginScreen">
    <div class="login-container">
      <div class="login-header">
        <h1>ITG Dashboard</h1>
        <p>Logistics Management System</p>
      </div>
      <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter your username" required autofocus>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required>
        </div>
        <div class="login-error" id="loginError"></div>
        <button type="submit" class="login-btn" id="loginButton">
          Sign In
          <span class="login-spinner" id="loginSpinner">
            <div class="spinner"></div>
          </span>
        </button>
      </form>
    </div>
  </div>

  <!-- DASHBOARD (hidden until auth) -->
  <div class="dashboard" id="dashboard">
    <div class="container">
      <div class="header">
        <h1>ITG Dashboard</h1>
        <div class="header-right">
          <div class="user-badge">👤 <span id="currentUser"></span></div>
          <button class="logout-btn" onclick="handleLogout()">🚪 Logout</button>
        </div>
      </div>
      <div class="subtitle">Select Logistic_report.xlsm to load data</div>
      
      <div class="file-upload-section" id="uploadSection">
        <button class="upload-btn" onclick="document.getElementById('fileInput').click()">📁 Select Logistic_report.xlsm</button>
        <input type="file" id="fileInput" class="file-input" accept=".xlsx,.xlsm" onchange="handleFileSelect(event)">
      </div>

      <div class="search-section" id="searchSection" style="display: none;">
        <div class="search-title">🔍 Quick Search</div>
        <div class="search-inputs">
          <input type="text" id="searchRIF" placeholder="RIF / FTP+YEAR / Supplier S/C..." onchange="render()" oninput="render()">
          <input type="text" id="searchSupplier" placeholder="Supplier name..." onchange="render()" oninput="render()">
          <input type="text" id="searchInvoice" placeholder="Invoice No..." onchange="render()" oninput="render()">
          <input type="text" id="searchConsignee" placeholder="Consignee / Customer..." onchange="render()" oninput="render()">
        </div>
      </div>

      <div class="filters-wrapper" id="filtersSection" style="display: none;">
        <div class="filters-section">
          <div class="filter-group">
            <label class="filter-label">Year</label>
            <div class="filter-buttons" id="yearButtons"></div>
          </div>
          <div class="filter-group">
            <label class="filter-label">Shipping Status</label>
            <div class="filter-buttons" id="shipButtons"></div>
          </div>
          <div class="filter-group">
            <label class="filter-label">Collection Status</label>
            <div class="filter-buttons" id="collButtons"></div>
          </div>
          <div class="filter-group">
            <label class="filter-label">Payment Status</label>
            <div class="filter-buttons" id="payButtons"></div>
          </div>
          <div class="filter-group">
            <label class="filter-label">Followed By</label>
            <div class="filter-buttons" id="followedButtons"></div>
          </div>
          <div class="filter-group">
            <button class="filter-btn clear" onclick="clearAllFilters()">🔄 Clear All</button>
          </div>
        </div>
        <div class="filters-section">
          <div class="filter-group">
            <label class="filter-label">Nickname</label>
            <div class="filter-buttons" id="nicknameButtons"></div>
          </div>
        </div>
      </div>

      <div class="kpi-grid" id="kpis" style="display: none;"></div>
      
      <div class="table-wrapper" id="tableWrapper" style="display: none;">
        <div class="table-info" id="tableInfo"></div>
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th onclick="sortTable('rif')">RIF</th>
                <th onclick="sortTable('ftp_year')">FTP</th>
                <th onclick="sortTable('acid')">ACID NO.</th>
                <th onclick="sortTable('year')">Year</th>
                <th onclick="sortTable('supplier_sc')">Supplier S/C</th>
                <th onclick="sortTable('supplier')">Supplier</th>
                <th onclick="sortTable('invoice')">Invoice</th>
                <th onclick="sortTable('consignee')">Consignee</th>
                <th onclick="sortTable('goods_desc')">Goods</th>
                <th onclick="sortTable('ship_status')">Ship</th>
                <th onclick="sortTable('coll_status')">Collect</th>
                <th onclick="sortTable('paying_status')">Pay</th>
                <th onclick="sortTable('balance')">Balance</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>

      <div class="charts-section" id="chartsSection" style="display: none;">
        <div class="chart-card">
          <div class="chart-title">Total Purchase</div>
          <div class="chart-left"><div class="chart-canvas"><canvas id="supplierChart"></canvas></div></div>
          <div class="chart-right"><div class="top10-title">TOP 10</div><div id="supplierTop10"></div></div>
        </div>
        <div class="chart-card">
          <div class="chart-title">Total Sales</div>
          <div class="chart-left"><div class="chart-canvas"><canvas id="customerChart"></canvas></div></div>
          <div class="chart-right"><div class="top10-title">TOP 10</div><div id="customerTop10"></div></div>
        </div>
        <div class="chart-card">
          <div class="chart-title">Total Items</div>
          <div class="chart-left"><div class="chart-canvas"><canvas id="categoryChart"></canvas></div></div>
          <div class="chart-right"><div class="top10-title">TOP 10</div><div id="categoryTop10"></div></div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-content">
      <div class="modal-header"><div class="modal-title" id="modalTitle"></div><button class="close-btn" onclick="closeModal()">✕</button></div>
      <div id="modalBody"></div>
    </div>
  </div>

  <script>
    // ============================================
    // AUTHENTICATION LAYER
    // ============================================
    // WARNING: Client-side authentication in a static HTML dashboard is NOT production-grade security.
    // Hashed passwords are exposed to the browser and can be intercepted.
    // This implementation provides only a lightweight internal access barrier for private tools.
    // See technical notes below for production-grade alternatives.
    
    let USERS = [];
    let CURRENT_SESSION = null;

    // Load users from config/users.json (jsDelivr CDN - no CORS issues)
    async function loadUsers() {
      try {
        console.log('🔄 Caricando users.json da jsDelivr...');
        
        // jsDelivr CDN - affidabile e senza CORS issues
        const jsDelivrUrl = 'https://cdn.jsdelivr.net/gh/lipe9779/itg-dashboard@main/config/users.json';
        
        console.log('Fetch URL:', jsDelivrUrl);
        
        const response = await fetch(jsDelivrUrl);
        console.log('Response status:', response.status);
        
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        
        const text = await response.text();
        console.log('📄 File ricevuto:', text.substring(0, 150));
        
        USERS = JSON.parse(text);
        console.log('✅ USERS caricato:', USERS);
        console.log('Numero utenti:', USERS.length);
        console.log('Username nel file:', USERS.map(u => u.username));
      } catch (err) {
        console.error('❌ Error loading users.json:', err);
        showLoginError('Errore caricamento config. Vedi console (F12).');
      }
    }

    // Verify password against bcrypt hash (using bcryptjs library)
    async function verifyPassword(password, hash) {
      try {
        return await bcrypt.compare(password, hash);
      } catch (err) {
        console.error('Error verifying password:', err);
        return false;
      }
    }

    // Handle login form submission
    async function handleLogin(event) {
      event.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const loginBtn = document.getElementById('loginButton');
      const loginSpinner = document.getElementById('loginSpinner');

      console.log('🔐 DEBUG: Inizio login');
      console.log('🔐 DEBUG: Username=', username, 'PasswordLen=', password.length);
      console.log('🔐 DEBUG: USERS array=', USERS);
      console.log('🔐 DEBUG: USERS length=', USERS.length);

      // Disable button and show spinner
      loginBtn.disabled = true;
      loginSpinner.classList.add('show');

      // Simulate network delay for UX
      await new Promise(resolve => setTimeout(resolve, 500));

      // Find user
      console.log('🔐 DEBUG: Ricerca utente...');
      const user = USERS.find(u => {
        console.log(`  Confronto: u.username="${u.username}" === username="${username}" ? ${u.username === username}, enabled=${u.enabled}`);
        return u.username === username && u.enabled;
      });
      
      console.log('🔐 DEBUG: Utente trovato?', user);
      
      if (!user) {
        console.error('❌ Utente non trovato o disabilitato');
        showLoginError('Invalid username or password.');
        loginBtn.disabled = false;
        loginSpinner.classList.remove('show');
        return;
      }

      // Verify password
      console.log('🔐 DEBUG: Verifica password...');
      console.log('🔐 DEBUG: Hash nel file:', user.passwordHash.substring(0, 30) + '...');
      const isValid = await verifyPassword(password, user.passwordHash);
      console.log('🔐 DEBUG: Password valida?', isValid);
      
      if (!isValid) {
        console.error('❌ Password non corrisponde');
        showLoginError('Invalid username or password.');
        loginBtn.disabled = false;
        loginSpinner.classList.remove('show');
        return;
      }

      // Success: create session
      console.log('✅ Login success! Creazione sessione...');
      CURRENT_SESSION = {
        username: user.username,
        role: user.role,
        timestamp: Date.now(),
        token: Math.random().toString(36).substring(2, 15) // Simple session token
      };

      // Save session to sessionStorage (current browser session only)
      sessionStorage.setItem('itg_session', JSON.stringify(CURRENT_SESSION));

      // Show dashboard
      showDashboard();
      loginBtn.disabled = false;
      loginSpinner.classList.remove('show');
      document.getElementById('username').value = '';
      document.getElementById('password').value = '';
    }

    function showLoginError(message) {
      const errorEl = document.getElementById('loginError');
      errorEl.textContent = message;
      errorEl.classList.add('show');
      setTimeout(() => errorEl.classList.remove('show'), 5000);
    }

    function showDashboard() {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboard').classList.add('active');
      document.getElementById('currentUser').textContent = CURRENT_SESSION.username;
    }

    function hideDashboard() {
      document.getElementById('dashboard').classList.remove('active');
      document.getElementById('loginScreen').style.display = 'flex';
    }

    function handleLogout() {
      CURRENT_SESSION = null;
      sessionStorage.removeItem('itg_session');
      hideDashboard();
      document.getElementById('username').value = '';
      document.getElementById('password').value = '';
    }

    function restoreSession() {
      const storedSession = sessionStorage.getItem('itg_session');
      if (storedSession) {
        try {
          CURRENT_SESSION = JSON.parse(storedSession);
          showDashboard();
        } catch (err) {
          console.error('Error restoring session:', err);
          CURRENT_SESSION = null;
          hideDashboard();
        }
      }
    }

    // ============================================
    // DASHBOARD CODE (unchanged from v3)
    // ============================================
    let ORDERS = [];
    let chartInstances = {};
    let activeFilters = { year: [], ship: [], coll: [], pay: [], nickname: [], followed: [] };
    let sortColumn = 'rif';
    let sortAsc = false;
    const colors = ['#E8AA14', '#10B981', '#ef4444', '#3b82f6', '#f59e0b', '#8b5cf6', '#ec4899', '#14b8a6', '#6366f1', '#f97316'];

    function handleFileSelect(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const data = new Uint8Array(e.target.result);
          const workbook = XLSX.read(data, { type: 'array' });
          const sheet = workbook.Sheets['EGYPT Customers'];
          const sheetData = XLSX.utils.sheet_to_json(sheet, { header: 1 });
          const colIdx = { rif: 0, year: 1, acid: 2, supplier_sc: 7, supplier: 4, invoice: 19, consignee: 51, goods_desc: 9, item_desc: 10, ship_status: 41, coll_status: 63, paying_status: 27, balance: 62, ftp_year: 45, quantity: 14, containers: 13, dp_price: 15, dp_value: 20, deposit_italy: 21, paid_italy: 23, balance_paid: 26, sales_price: 56, sc_value: 57, magic_invoice: 58, deposit_received: 60, bank_used: 66, upload_doc: 69, nickname: 5, followed_by: 6, category: 11 };
          ORDERS = [];
          sheetData.slice(1).forEach(row => {
            const order = {};
            Object.entries(colIdx).forEach(([key, idx]) => {
              const val = row[idx];
              if (val != null && val !== '') order[key] = String(val).trim();
            });
            if (order.rif) ORDERS.push(order);
          });
          document.getElementById('uploadSection').style.display = 'none';
          document.getElementById('searchSection').style.display = 'block';
          document.getElementById('filtersSection').style.display = 'grid';
          document.getElementById('chartsSection').style.display = 'flex';
          document.getElementById('kpis').style.display = 'grid';
          document.getElementById('tableWrapper').style.display = 'flex';
          setupFilters();
          renderCharts();
          render();
        } catch (err) {
          alert('Error: ' + err.message);
        }
      };
      reader.readAsArrayBuffer(file);
    }

    function setupFilters() {
      const years = [...new Set(ORDERS.map(o => o.year).filter(Boolean))].sort((a, b) => parseInt(b) - parseInt(a));
      const ships = [...new Set(ORDERS.map(o => o.ship_status).filter(Boolean))];
      const colls = [...new Set(ORDERS.map(o => o.coll_status).filter(Boolean))];
      const pays = [...new Set(ORDERS.map(o => o.paying_status).filter(Boolean))];
      const nicknames = [...new Set(ORDERS.map(o => o.nickname).filter(Boolean))].sort();
      const followed = [...new Set(ORDERS.map(o => o.followed_by).filter(Boolean))].sort();

      document.getElementById('yearButtons').innerHTML = years.map(y => `<button class="filter-btn" onclick="toggleFilter('year', '${y}')">${y}</button>`).join('');
      document.getElementById('shipButtons').innerHTML = ships.map(s => `<button class="filter-btn" onclick="toggleFilter('ship', '${s}')">${s}</button>`).join('');
      document.getElementById('collButtons').innerHTML = colls.map(c => `<button class="filter-btn" onclick="toggleFilter('coll', '${c}')">${c}</button>`).join('');
      document.getElementById('payButtons').innerHTML = pays.map(p => `<button class="filter-btn" onclick="toggleFilter('pay', '${p}')">${p}</button>`).join('');
      document.getElementById('nicknameButtons').innerHTML = nicknames.map(n => `<button class="filter-btn" onclick="toggleFilter('nickname', '${n}')">${n}</button>`).join('');
      document.getElementById('followedButtons').innerHTML = followed.map(f => `<button class="filter-btn" onclick="toggleFilter('followed', '${f}')">${f}</button>`).join('');
    }

    function toggleFilter(type, value) {
      if (activeFilters[type].includes(value)) activeFilters[type] = activeFilters[type].filter(v => v !== value);
      else activeFilters[type].push(value);
      updateFilterButtons();
      renderCharts();
      render();
    }

    function updateFilterButtons() {
      document.querySelectorAll('.filter-btn:not(.clear)').forEach(btn => {
        const text = btn.textContent;
        btn.classList.toggle('active', Object.values(activeFilters).some(arr => arr.includes(text)));
      });
    }

    function clearAllFilters() {
      activeFilters = { year: [], ship: [], coll: [], pay: [], nickname: [], followed: [] };
      document.getElementById('searchRIF').value = '';
      document.getElementById('searchSupplier').value = '';
      document.getElementById('searchInvoice').value = '';
      document.getElementById('searchConsignee').value = '';
      updateFilterButtons();
      renderCharts();
      render();
    }

    function getFiltered() {
      return ORDERS.filter(o => {
        if (activeFilters.year.length && !activeFilters.year.includes(o.year)) return false;
        if (activeFilters.ship.length && !activeFilters.ship.includes(o.ship_status)) return false;
        if (activeFilters.coll.length && !activeFilters.coll.includes(o.coll_status)) return false;
        if (activeFilters.pay.length && !activeFilters.pay.includes(o.paying_status)) return false;
        if (activeFilters.nickname.length && !activeFilters.nickname.includes(o.nickname)) return false;
        if (activeFilters.followed.length && !activeFilters.followed.includes(o.followed_by)) return false;
        const q = (document.getElementById('searchRIF').value + document.getElementById('searchSupplier').value + document.getElementById('searchInvoice').value + document.getElementById('searchConsignee').value).toLowerCase();
        if (q) {
          const search = `${o.rif}${o.ftp_year}${o.supplier_sc}${o.supplier}${o.invoice}${o.consignee}`.toLowerCase();
          if (!search.includes(q)) return false;
        }
        return true;
      });
    }

    function sortTable(col) {
      if (sortColumn === col) sortAsc = !sortAsc;
      else { sortColumn = col; sortAsc = col === 'rif' ? false : true; }
      document.querySelectorAll('th').forEach(th => th.classList.remove('sort-asc', 'sort-desc'));
      event.target.classList.add(sortAsc ? 'sort-asc' : 'sort-desc');
      render();
    }

    function renderCharts() {
      const filt = getFiltered();
      const supplierData = {}, customerData = {}, categoryData = {};
      filt.forEach(o => {
        supplierData[o.supplier || 'Unknown'] = (supplierData[o.supplier || 'Unknown'] || 0) + (parseFloat(o.dp_value) || 0);
        customerData[o.consignee || 'Unknown'] = (customerData[o.consignee || 'Unknown'] || 0) + (parseFloat(o.sc_value) || 0);
        categoryData[o.category || 'Unknown'] = (categoryData[o.category || 'Unknown'] || 0) + (parseFloat(o.quantity) || 0);
      });
      renderChart('supplierChart', supplierData, 'supplier', 'supplierTop10');
      renderChart('customerChart', customerData, 'consignee', 'customerTop10');
      renderChart('categoryChart', categoryData, 'category', 'categoryTop10');
    }

    function renderChart(canvasId, data, type, top10Id) {
      const labels = Object.keys(data);
      const values = Object.values(data);
      const ctx = document.getElementById(canvasId).getContext('2d');
      if (chartInstances[canvasId]) chartInstances[canvasId].destroy();
      chartInstances[canvasId] = new Chart(ctx, {
        type: 'doughnut',
        data: { labels, datasets: [{ data: values, backgroundColor: colors.slice(0, labels.length) }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, onClick: (e, els) => { if (els.length) showDetailReport(type, labels[els[0].index]); } }
      });
      const sorted = Object.entries(data).sort((a, b) => b[1] - a[1]).slice(0, 10);
      document.getElementById(top10Id).innerHTML = sorted.map((item, idx) => `<div class="top10-item"><span class="top10-rank">${idx + 1}</span><span class="top10-label">${item[0]}</span><span class="top10-value">${fmt(item[1])}</span></div>`).join('');
    }

    function showDetailReport(type, value) {
      const filt = getFiltered();
      let data = type === 'supplier' ? filt.filter(o => o.supplier === value) : type === 'consignee' ? filt.filter(o => o.consignee === value) : filt.filter(o => o.category === value);
      document.getElementById('modalTitle').textContent = `${type === 'supplier' ? 'Supplier' : type === 'consignee' ? 'Customer' : 'Category'}: ${value}`;
      let table = '<table class="report-table"><thead><tr><th>RIF</th><th>FTP</th><th>Invoice</th><th>Year</th><th>Amount</th></tr></thead><tbody>';
      data.forEach(o => { const amt = type === 'category' ? fmtQty(o.quantity) : type === 'supplier' ? fmt(o.dp_value) : fmt(o.sc_value); table += `<tr><td>${o.rif}</td><td>${o.ftp_year || '—'}</td><td>${o.invoice || '—'}</td><td>${o.year}</td><td>${amt}</td></tr>`; });
      document.getElementById('modalBody').innerHTML = table + '</tbody></table>';
      document.getElementById('modal').classList.add('active');
    }

    function fmt(v, d = 2) { const n = parseFloat(v); return isNaN(n) ? '—' : `$${n.toLocaleString('it-IT', { minimumFractionDigits: d, maximumFractionDigits: d })}`; }
    function fmtQty(v) { const n = parseFloat(v); return isNaN(n) ? '—' : n.toLocaleString('it-IT', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
    function fmtContainers(v) { const n = parseInt(v); return isNaN(n) ? '—' : n.toString(); }

    function render() {
      let filt = getFiltered();
      filt.sort((a, b) => {
        let aYear = parseInt(a.year) || 0, bYear = parseInt(b.year) || 0;
        if (aYear !== bYear) return bYear - aYear;
        let aRIF = parseInt(a.rif) || 0, bRIF = parseInt(b.rif) || 0;
        return bRIF - aRIF;
      });
      
      let totalPurchase = 0, totalSales = 0, totalQty = 0, totalContainers = 0;
      filt.forEach(o => { totalPurchase += parseFloat(o.dp_value) || 0; totalSales += parseFloat(o.sc_value) || 0; totalQty += parseFloat(o.quantity) || 0; totalContainers += parseFloat(o.containers) || 0; });
      document.getElementById('kpis').innerHTML = `
        <div class="kpi-card"><div class="kpi-label">Total Purchase</div><div class="kpi-value">${fmt(totalPurchase)}</div></div>
        <div class="kpi-card"><div class="kpi-label">Total Sales</div><div class="kpi-value">${fmt(totalSales)}</div></div>
        <div class="kpi-card"><div class="kpi-label">Total Quantity</div><div class="kpi-value">${fmtQty(totalQty)} KG</div></div>
        <div class="kpi-card"><div class="kpi-label">Total Containers</div><div class="kpi-value">${fmtContainers(totalContainers)}</div></div>
      `;
      document.getElementById('tableInfo').textContent = `${filt.length} of ${ORDERS.length}`;
      if (filt.length === 0) { document.getElementById('tableBody').innerHTML = '<tr><td colspan="13" class="no-data">No orders match</td></tr>'; return; }
      
      document.getElementById('tableBody').innerHTML = filt.map(o => `
        <tr onclick="detail('${ORDERS.indexOf(o)}')">
          <td class="highlight">${o.rif}</td><td class="highlight">${o.ftp_year || '—'}</td><td>${o.acid || '—'}</td><td>${o.year}</td><td>${o.supplier_sc || '—'}</td><td>${o.supplier || '—'}</td><td>${o.invoice || '—'}</td><td>${o.consignee || '—'}</td><td>${o.goods_desc || '—'}</td>
          <td><span class="status-badge ${o.ship_status === 'Shipped' ? 'status-ok' : 'status-pending'}">${o.ship_status ? o.ship_status.substring(0, 3) : '—'}</span></td>
          <td><span class="status-badge ${o.coll_status === 'Collected' ? 'status-ok' : 'status-pending'}">${o.coll_status ? o.coll_status.substring(0, 3) : '—'}</span></td>
          <td><span class="status-badge ${o.paying_status === 'Paid' ? 'status-ok' : 'status-pending'}">${o.paying_status ? o.paying_status.substring(0, 3) : '—'}</span></td>
          <td style="color: ${parseFloat(o.balance) > 0 ? '#ef4444' : '#10B981'};">${fmt(o.balance)}</td>
        </tr>
      `).join('');
    }

    function detail(i) {
      const o = ORDERS[i];
      const orderKey = `${o.rif}|${o.ftp_year}|${o.acid}`;
      const relatedOrders = ORDERS.filter(x => {
        const xKey = `${x.rif}|${x.ftp_year}|${x.acid}`;
        return xKey === orderKey;
      });
      
      let totalQty = 0, totalContainers = 0, totalDpValue = 0, totalScValue = 0, totalDepositItaly = 0, totalPaidItaly = 0, totalBalancePaid = 0, totalDepositReceived = 0, totalBalance = 0;
      
      relatedOrders.forEach(x => {
        const qty = parseFloat(x.quantity) || 0;
        const containers = parseFloat(x.containers) || 0;
        const dpVal = parseFloat(x.dp_value) || 0;
        const scVal = parseFloat(x.sc_value) || 0;
        const depIta = parseFloat(x.deposit_italy) || 0;
        const paidIta = parseFloat(x.paid_italy) || 0;
        const balPaid = parseFloat(x.balance_paid) || 0;
        const depRec = parseFloat(x.deposit_received) || 0;
        const bal = parseFloat(x.balance) || 0;
        
        totalQty += qty;
        totalContainers += containers;
        totalDpValue += dpVal;
        totalScValue += scVal;
        totalDepositItaly += depIta;
        totalPaidItaly += paidIta;
        totalBalancePaid += balPaid;
        totalDepositReceived += depRec;
        totalBalance += bal;
      });
      
      const itemDisplay = relatedOrders.length > 1 ? `more items (${relatedOrders.length})` : (o.item_desc || '—');
      
      document.getElementById('modalTitle').textContent = `FTP ${o.ftp_year || o.rif}`;
      document.getElementById('modalBody').innerHTML = `
        <div class="detail-row"><div class="detail-label">RIF</div><div class="detail-value highlight">${o.rif}</div></div>
        <div class="detail-row"><div class="detail-label">FTP</div><div class="detail-value highlight">${o.ftp_year || '—'}</div></div>
        <div class="detail-row"><div class="detail-label">ACID NO.</div><div class="detail-value">${o.acid || '—'}</div></div>
        <div class="detail-row"><div class="detail-label">Year</div><div class="detail-value">${o.year}</div></div>
        <div class="detail-row"><div class="detail-label">Supplier S/C</div><div class="detail-value highlight">${o.supplier_sc || '—'}</div></div>
        <div class="detail-row"><div class="detail-label">Supplier</div><div class="detail-value">${o.supplier || '—'}</div></div>
        <div class="detail-row"><div class="detail-label">Invoice</div><div class="detail-value highlight">${o.invoice || '—'}</div></div>
        <div class="detail-row"><div class="detail-label">Item</div><div class="detail-value">${itemDisplay}</div></div>
        <div class="detail-row"><div class="detail-label">Quantity</div><div class="detail-value">${fmtQty(totalQty) || '—'}</div></div>
        <div class="detail-row"><div class="detail-label">N. Containers</div><div class="detail-value">${fmtContainers(totalContainers) || '—'}</div></div>
        <div class="detail-row"><div class="detail-label">DP Price</div><div class="detail-value"></div></div>
        <div class="detail-row"><div class="detail-label">DP Value</div><div class="detail-value highlight">${fmt(totalDpValue) || '—'}</div></div>
        <div class="detail-row"><div class="detail-label">Deposit from Italy</div><div class="detail-value">${fmt(totalDepositItaly) || '—'}</div></div>
        <div class="detail-row"><div class="detail-label">Paid from Italy</div><div class="detail-value">${fmt(totalPaidItaly) || '—'}</div></div>
        <div class="detail-row"><div class="detail-label">Balance to be Paid</div><div class="detail-value" style="color: ${totalBalancePaid > 0 ? '#ef4444' : '#10B981'};">${fmt(totalBalancePaid) || '—'}</div></div>
        <div class="detail-row"><div class="detail-label">Consignee</div><div class="detail-value">${o.consignee || '—'}</div></div>
        <div class="detail-row"><div class="detail-label">Mago Invoice No.</div><div class="detail-value">${o.magic_invoice || '—'}</div></div>
        <div class="detail-row"><div class="detail-label">Sales Price</div><div class="detail-value"></div></div>
        <div class="detail-row"><div class="detail-label">S/C Value</div><div class="detail-value highlight">${fmt(totalScValue) || '—'}</div></div>
        <div class="detail-row"><div class="detail-label">Payment Received</div><div class="detail-value">${fmt(totalDepositReceived) || '—'}</div></div>
        <div class="detail-row"><div class="detail-label">Balance to Receive</div><div class="detail-value" style="color: ${totalBalance > 0 ? '#ef4444' : '#10B981'};">${fmt(totalBalance) || '—'}</div></div>
        <div class="detail-row"><div class="detail-label">Bank Used</div><div class="detail-value">${o.bank_used || '—'}</div></div>
        <div class="detail-row"><div class="detail-label">Upload Document</div><div class="detail-value">${o.upload_doc || '—'}</div></div>
        <div class="detail-row"><div class="detail-label">Shipping</div><div class="detail-value">${o.ship_status || '—'}</div></div>
        <div class="detail-row"><div class="detail-label">Collection</div><div class="detail-value">${o.coll_status || '—'}</div></div>
        <div class="detail-row"><div class="detail-label">Payment</div><div class="detail-value">${o.paying_status || '—'}</div></div>
      `;
      document.getElementById('modal').classList.add('active');
    }

    function closeModal() { document.getElementById('modal').classList.remove('active'); }

    // ============================================
    // INIT ON PAGE LOAD
    // ============================================
    window.addEventListener('DOMContentLoaded', async () => {
      await loadUsers();
      restoreSession();
    });
  </script>
</body>
</html>
