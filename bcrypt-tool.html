<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ITG — User Manager</title>
  <script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #000; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }

    .denied { text-align: center; }
    .denied h1 { font-size: 48px; margin-bottom: 12px; }
    .denied p  { font-size: 14px; color: #666; }

    .tool { background: #fff; border-radius: 12px; padding: 36px; width: 100%; max-width: 520px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); }
    .tool h1 { font-size: 20px; font-weight: 700; color: #E8AA14; margin-bottom: 4px; }
    .tool p  { font-size: 12px; color: #666; margin-bottom: 28px; }

    .section { margin-bottom: 32px; }
    .section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; color: #999; margin-bottom: 14px; letter-spacing: .05em; border-bottom: 1px solid #eee; padding-bottom: 8px; }

    label { font-size: 11px; font-weight: 600; color: #444; text-transform: uppercase; display: block; margin-bottom: 6px; }
    input[type="text"], input[type="password"] {
      width: 100%; padding: 10px 12px; border: 1px solid #d0d0d0;
      border-radius: 6px; font-size: 14px; color: #000;
      background: #fafafa; margin-bottom: 14px; outline: none;
      transition: border-color .2s;
    }
    input:focus { border-color: #E8AA14; background: #fff; }

    .btn { width: 100%; padding: 11px; background: #E8AA14; color: #000; border: none; border-radius: 6px; font-size: 14px; font-weight: 700; cursor: pointer; transition: background .2s; }
    .btn:hover:not(:disabled) { background: #f5bb45; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }

    .result { margin-top: 16px; padding: 14px; border-radius: 6px; font-size: 12px; word-break: break-all; display: none; }
    .result.ok    { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); color: #065f46; }
    .result.error { background: rgba(239,68,68,0.1);  border: 1px solid rgba(239,68,68,0.3);  color: #7f1d1d; }

    .copy-btn { float: right; background: #E8AA14; border: none; border-radius: 4px; padding: 3px 10px; font-size: 11px; font-weight: 600; cursor: pointer; color: #000; margin-left: 8px; }
    .copy-btn:hover { background: #f5bb45; }

    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(0,0,0,0.15); border-top-color: #000; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 700; }
    .badge.ok   { background: rgba(16,185,129,0.15); color: #065f46; }
    .badge.fail { background: rgba(239,68,68,0.15);  color: #7f1d1d; }

    pre { font-family: 'Courier New', monospace; font-size: 11px; white-space: pre-wrap; margin-top: 8px; }
  </style>
</head>
<body>

<div class="denied" id="denied" style="display:none;">
  <h1>🔒</h1>
  <p>Accesso negato. Questa pagina è riservata all'amministratore.</p>
</div>

<div class="tool" id="tool" style="display:none;">
  <h1>⚙️ User Manager</h1>
  <p>Genera e verifica hash bcrypt per <code>config/users.json</code></p>
  <a href="index.html" style="display:inline-block;margin-bottom:20px;font-size:12px;color:#666;text-decoration:none;">← Torna alla Dashboard</a>

  <!-- GENERA -->
  <div class="section">
    <div class="section-title">Genera Hash</div>
    <label for="genUser">Username</label>
    <input type="text" id="genUser" placeholder="es. mario">
    <label for="genPass">Password</label>
    <input type="password" id="genPass" placeholder="Password da hashare">
    <button class="btn" id="genBtn" onclick="generateHash()">Genera Hash</button>
    <div class="result" id="genResult"></div>
  </div>

  <!-- VERIFICA -->
  <div class="section">
    <div class="section-title">Verifica Hash</div>
    <label for="verPass">Password</label>
    <input type="password" id="verPass" placeholder="Password da verificare">
    <label for="verHash">Hash esistente</label>
    <input type="text" id="verHash" placeholder="$2b$12$...">
    <button class="btn" id="verBtn" onclick="verifyHash()">Verifica</button>
    <div class="result" id="verResult"></div>
  </div>

  <!-- JSON OUTPUT -->
  <div class="section" id="jsonSection" style="display:none;">
    <div class="section-title">JSON per users.json</div>
    <div class="result ok" id="jsonResult" style="display:block;"></div>
  </div>
</div>

<script>
  // ── GUARD ────────────────────────────────────────────────────────────────
  (function() {
    try {
      const raw = sessionStorage.getItem('itg_session');
      if (!raw) throw new Error();
      const s = JSON.parse(raw);
      if (s.username !== 'filippo') throw new Error();
      document.getElementById('tool').style.display = 'block';
    } catch {
      document.getElementById('denied').style.display = 'block';
    }
  })();

  function getLib() {
    if (typeof dcodeIO !== 'undefined' && dcodeIO.bcrypt) return dcodeIO.bcrypt;
    if (typeof bcrypt !== 'undefined') return bcrypt;
    return null;
  }

  // ── GENERA ───────────────────────────────────────────────────────────────
  async function generateHash() {
    const username = document.getElementById('genUser').value.trim();
    const password = document.getElementById('genPass').value;
    const btn = document.getElementById('genBtn');
    const res = document.getElementById('genResult');

    if (!username || !password) { showResult(res, 'error', 'Compila username e password.'); return; }
    const lib = getLib();
    if (!lib) { showResult(res, 'error', 'Libreria bcrypt non disponibile.'); return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Generazione in corso...';
    res.style.display = 'none';
    document.getElementById('jsonSection').style.display = 'none';

    try {
      const hash = await lib.hash(password, 12);
      const ok = await lib.compare(password, hash);
      if (!ok) throw new Error('Verifica post-generazione fallita.');

      showResult(res, 'ok',
        `<span class="badge ok">✓ Verificato</span>` +
        `<button class="copy-btn" onclick="copyText(this,'${hash}')">Copia hash</button>` +
        `<br><br><strong>Hash:</strong><br>${hash}`
      );

      const json = JSON.stringify([{ username, passwordHash: hash, role: 'user', enabled: true }], null, 2);
      document.getElementById('jsonSection').style.display = 'block';
      document.getElementById('jsonResult').innerHTML =
        `<button class="copy-btn" onclick="copyText(this,document.getElementById('jsonPre').textContent)">Copia JSON</button>` +
        `<pre id="jsonPre">${esc(json)}</pre>`;

    } catch(err) {
      showResult(res, 'error', '❌ ' + err.message);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Genera Hash';
    }
  }

  // ── VERIFICA ─────────────────────────────────────────────────────────────
  async function verifyHash() {
    const password = document.getElementById('verPass').value;
    const hash     = document.getElementById('verHash').value.trim();
    const btn = document.getElementById('verBtn');
    const res = document.getElementById('verResult');

    if (!password || !hash) { showResult(res, 'error', 'Compila entrambi i campi.'); return; }
    const lib = getLib();
    if (!lib) { showResult(res, 'error', 'Libreria bcrypt non disponibile.'); return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Verifica...';
    res.style.display = 'none';

    try {
      const ok = await lib.compare(password, hash);
      showResult(res, ok ? 'ok' : 'error',
        ok
          ? '<span class="badge ok">✓ Password corretta — hash valido</span>'
          : '<span class="badge fail">✗ Password non corrisponde all\'hash</span>'
      );
    } catch(err) {
      showResult(res, 'error', '❌ Hash non valido: ' + err.message);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Verifica';
    }
  }

  // ── UTILS ─────────────────────────────────────────────────────────────────
  function showResult(el, type, html) {
    el.className = 'result ' + type;
    el.innerHTML = html;
    el.style.display = 'block';
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function copyText(btn, text) {
    navigator.clipboard.writeText(text).then(() => {
      const orig = btn.textContent;
      btn.textContent = '✓ Copiato';
      setTimeout(() => btn.textContent = orig, 1500);
    });
  }
</script>
</body>
</html>
